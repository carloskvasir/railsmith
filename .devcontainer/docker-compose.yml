version: '3.8'

services:
  app:
    # A mágica do Build Instantâneo acontece aqui:
    image: ghcr.io/carloskvasir/railsmith:latest
    volumes:
      - ../:/workspace:cached
    # Mantém o container rodando para o VS Code / Codespaces se conectar
    command: sleep infinity
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
